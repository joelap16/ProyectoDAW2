<h2>Lista de Tickets</h2>

Cantidad de tickets: {{ tickets.length }}

<table border="1">

    <tr>

        <th>ID</th>
        <th>Título</th>
        <th>Categoría</th>
        <th>Estado</th>
        <th>Usuario</th>
        <th>Técnico Actual</th>
        <th>Reasignar Técnico</th>
        <th>Acciones</th>

    </tr>

    @for (ticket of tickets; track ticket.id) {

        <tr>

            <td>{{ ticket.id }}</td>

            <td>{{ ticket.titulo }}</td>

            <td>{{ ticket.categoria }}</td>

            <td>

                <select
                    [ngModel]="ticket.estado"
                    (ngModelChange)="cambiarEstado(ticket, $event)"
                    name="estado-{{ ticket.id }}">

                    @for (estado of estadosPermitidos(ticket.estado); track estado) {

                        <option [ngValue]="estado">
                            {{ estado }}
                        </option>

                    }

                </select>

            </td>

            <td>{{ ticket.usuario }}</td>

            <td>{{ ticket.tecnico }}</td>

            <td>

                <select #tecnicoSelect>

                    <option selected disabled>
                        Seleccione un técnico
                    </option>

                    @for (tecnico of tecnicos; track tecnico.id) {

                        <option [value]="tecnico.id">

                            {{ tecnico.nombreCompleto }}
                            - {{ tecnico.categoria }}

                        </option>

                    }

                </select>

                <button
                    (click)="asignarTecnico(ticket, +tecnicoSelect.value)">

                    Asignar

                </button>

            </td>

            <td>

                <button (click)="eliminarTicket(ticket.id)">
                    Eliminar
                </button>

            </td>

        </tr>

    }

</table>
