<div class="auth-page">
  <div class="auth-card">
    <h2>Crear Cuenta</h2>

    <form [formGroup]="form" (ngSubmit)="registrar()">
      <div class="form-group">
        <label>Nombre</label>
        <input class="form-control" type="text" formControlName="nombre" placeholder="Juan">
        <div class="form-error" *ngIf="form.get('nombre')?.touched && form.get('nombre')?.invalid">
          El nombre es obligatorio.
        </div>
      </div>

      <div class="form-group">
        <label>Apellido</label>
        <input class="form-control" type="text" formControlName="apellido" placeholder="Pérez">
        <div class="form-error" *ngIf="form.get('apellido')?.touched && form.get('apellido')?.invalid">
          El apellido es obligatorio.
        </div>
      </div>

      <div class="form-group">
        <label>Correo</label>
        <input class="form-control" type="email" formControlName="email" placeholder="correo@ejemplo.com">
        <div class="form-error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
          Ingresa un correo válido.
        </div>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input class="form-control" type="password" formControlName="password" placeholder="Mín. 6 caracteres">
        <div class="form-error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          Mínimo 6 caracteres.
        </div>
      </div>

      <div class="alert alert-success" *ngIf="mensaje">{{ mensaje }}</div>
      <div class="alert alert-error" *ngIf="error">{{ error }}</div>

      <button class="btn btn-primary" style="width:100%; margin-top:8px" type="submit">
        Registrarse
      </button>
    </form>

    <div class="auth-link">
      ¿Ya tienes cuenta? <a routerLink="/auth/login">Inicia sesión</a>
    </div>
  </div>
</div>
